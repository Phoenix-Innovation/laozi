name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          # Build and vuln-check against the current patched Go toolchain.
          # go.mod's 'go 1.21' directive remains the minimum supported version;
          # pinning CI to EOL 1.21 reported already-patched stdlib CVEs.
          go-version: 'stable'
          # Only integrations/postgres has external deps (a go.sum); point the
          # module cache there so the root module doesn't warn about a missing one.
          cache-dependency-path: integrations/postgres/go.sum

      - name: Build
        run: go build ./...
      - name: Vet
        run: go vet ./...
      - name: Test (race)
        run: go test -race -count=1 ./...

      - name: staticcheck
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          staticcheck ./...
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: integrations/postgres (build + vet + analyzers)
        working-directory: integrations/postgres
        run: |
          go build ./...
          go vet ./...
          staticcheck ./...
          govulncheck ./...
